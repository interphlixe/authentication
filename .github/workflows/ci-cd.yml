name: CI/CD Pipeline

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Rust
      uses: actions/setup-rust@v1
      with:
        rust-version: 'stable'

    - name: Install dependencies
      run: |
        cargo build --release

    - name: Run tests
      run: |
        cargo test

    - name: Build for x86_64-unknown-linux-gnu
      run: |
        cargo build --release --target x86_64-unknown-linux-gnu

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Deploy to AWS Lambda
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_REGION: 'us-west-2'
      run: |
        # Package and deploy the Lambda function
        zip -j function.zip target/x86_64-unknown-linux-gnu/release/bootstrap
        aws lambda update-function-code --function-name interphlix-authentication --zip-file fileb://function.zip
