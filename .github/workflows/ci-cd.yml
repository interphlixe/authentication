name: CI/CD Pipeline

on:
  release:
    types: [published]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        override: true

    - name: Run tests
      run: |
        cargo test

    - name: Install Zig toolchain
      uses: korandoru/setup-zig@v1
      with:
        # Note: make sure you are using a recent version of zig (the one below isn't kept in sync with new releases)
        zig-version: 'stable'

    - name: Install Cargo Lambda
      uses: jaxxstorm/action-install-gh-release@v1.9.0
      with:
        repo: cargo-lambda/cargo-lambda

    - name: compile the code
      run: |
        cargo lambda build --output-format zip

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Package SAM application
      run: |
        sam package --template-file template.yaml --s3-bucket interphlix-auth-code --output-template-file packaged.yaml

    - name: Deploy SAM application
      run: |
        sam deploy --template-file packaged.yaml --stack-name interphlix-authentication --capabilities CAPABILITY_IAM
