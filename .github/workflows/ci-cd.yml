name: CI/CD Pipeline

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Rust
      uses: actions/setup-rust@v1
      with:
        rust-version: 'stable'

    - name: Run tests
      run: |
        cargo test

    - name: Install Zig toolchain
        uses: korandoru/setup-zig@v1
        with:
          # Note: make sure you are using a recent version of zig (the one below isn't kept in sync with new releases)
          zig-version: 'stable'

      - name: Install Cargo Lambda
        uses: jaxxstorm/action-install-gh-release@v1.9.0
        with:
          repo: cargo-lambda/cargo-lambda

    - name: compile the code
      run: |
        cargo lambda build --release

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Deploy to AWS Lambda
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_REGION: 'us-west-2'
      run: |
        # Package and deploy the Lambda function
        zip -j function.zip target/x86_64-unknown-linux-gnu/release/bootstrap
        aws lambda update-function-code --function-name interphlix-authentication --zip-file fileb://function.zip
