name: CI/CD Pipeline

on:
  release:
    types: [published]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        override: true

    - name: Run tests
      run: |
        cargo test

    - name: Cache Zig toolchain
      uses: actions/cache@v3
      with:
        path: /snap/zig
        key: ${{ runner.os }}-zig

    - name: Install snapd
      run: |
        sudo apt-get update
        sudo apt-get install -y snapd

    - name: Install Zig toolchain
      run: |
        sudo snap install zig --beta --classic

    - name: Install Cargo Lambda
      uses: jaxxstorm/action-install-gh-release@v1.9.0
      with:
        repo: cargo-lambda/cargo-lambda

    - name: compile the code
      run: |
        cargo lambda build --output-format zip

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Package SAM application
      run: |
        sam package --template-file template.yaml --s3-bucket interphlix-auth-code --output-template-file packaged.yaml

    - name: Deploy SAM application
      run: |
        sam deploy --template-file packaged.yaml --stack-name interphlix-authentication --capabilities CAPABILITY_IAM
